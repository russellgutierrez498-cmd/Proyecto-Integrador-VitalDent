<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema - Consultorio Dental Guzmán</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="CSS/stylediv.CSS">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="body-login">

    <div class="login-card">
        <svg class="login-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s-4-2-4-8c0-3.3 2.7-6 6-6s6 2.7 6 6c0 6-4 8-4 8"></path>
            <path d="M12 16v-4"></path>
        </svg>

        <h2>Consultorio Dental Guzmán</h2>
        <h3>Acceso al Sistema</h3>
        <p>Ingresa tus credenciales para continuar</p>

        <!-- FORMULARIO CON INTERCEPCIÓN ONSUBMIT -->
        <form onsubmit="procesarLogin(event)">
            <div class="form-group">
                <label for="usuario">Usuario o Correo</label>
                <input type="text" id="usuario" class="form-control" placeholder="drguzman@dentalguzman.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-submit" id="btnEntrar">ENTRAR</button>
        </form>

        <a href="index.html" class="back-link">← Regresar a la página principal</a>
    </div>

    <script>
        async function procesarLogin(event) {
            // DETIENE la recarga de la página e impide que aparezca el "?" en la URL
            event.preventDefault();

            const btn = document.getElementById('btnEntrar');
            const usuario = document.getElementById('usuario').value.trim();
            const password = document.getElementById('password').value.trim();

            btn.disabled = true;
            btn.innerText = 'VALIDANDO...';

            try {
                const response = await fetch('http://localhost:7000/api/login', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ 
                    correo: usuario, 
                    password: password
                    })
                });

                const textData = await response.text();
                let data;

                try {
                    data = JSON.parse(textData);
                } catch (e) {
                    data = { mensaje: textData };
                }

                // Si la respuesta fue exitosa HTTP 200
                if (response.ok) {
                    // Guardar datos del usuario
                    localStorage.setItem('usuario_sesion', JSON.stringify(data));
                    
                    // Redirigir al Dashboard principal
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.mensaje || "Credenciales incorrectas.");
                    btn.disabled = false;
                    btn.innerText = 'ENTRAR';
                }

            } catch (error) {
                console.error("Error al intentar conectar:", error);
                alert("No se pudo conectar con el servidor Backend Java. Asegúrate de que Main.java esté ejecutándose en http://localhost:7000");
                btn.disabled = false;
                btn.innerText = 'ENTRAR';
            }
        }
    </script>
</body>
</html>
