<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Visor Radiológico 3D - Consultorio Dental Guzmán</title>
    <link rel="stylesheet" href="CSS/stylediv.CSS">

<body class="body-visor">

    <header class="visor-header">
        <div class="visor-info-paciente">
            <a href="expediente.html" class="btn-regresar-visor">← Volver al Expediente</a>
            <div class="divisor-vertical"></div>
            <h2>Paciente: <span>Carlos Mendoza Valdez</span></h2>
            <span class="badge-estudio">Escaneo CBCT (Maxilofacial)</span>
        </div>
        <div class="visor-herramientas-top">
            <button class="btn-tool">Exportar</button>
            <button class="btn-tool">Imprimir</button>
        </div>
    </header>

    <div class="visor-layout">
        
        <aside class="visor-tools">
            <h3 class="tools-titulo">Controles 3D</h3>
    
            <div style="padding: 10px; background: #fff; margin-bottom: 10px; border-radius: 8px;">
                <input type="file" id="inputArchivo" accept="image/*,.stl,.dcm" style="margin-bottom: 10px; width: 100%;">
                <textarea id="inputNotas" placeholder="Notas del diagnóstico..." class="input-medico" style="margin-bottom: 10px; width: 100%;"></textarea>
                <button onclick="subirAlServidor()" class="btn-tool" style="width: 100%;">Subir Radiografía</button>
            </div>
            
            <div class="tool-group">
    <label>Rotación (Eje Y)</label>
    <input type="range" id="sliderRotacion" min="0" max="360" value="180" class="slider-medico" oninput="aplicarEfectos3D()">
</div>

<div class="tool-group">
    <label>Zoom</label>
    <input type="range" id="sliderZoom" min="1" max="100" value="50" class="slider-medico" oninput="aplicarEfectos3D()">
</div>

<div class="tool-group">
    <label>Contraste / Densidad</label>
    <input type="range" id="sliderContraste" min="0" max="100" value="75" class="slider-medico" oninput="aplicarEfectos3D()">
</div>

        </aside>

        <section class="visor-pantalla-central">
            
            <div class="simulador-3d">
                <img src="https://images.unsplash.com/photo-1606811841689-23dfddce3e95?q=80&w=800&auto=format&fit=crop" alt="Radiografía 3D Mockup" class="img-3d-mockup">
                
                <div class="overlay-datos top-left">FOV: 8x8 cm<br>Voxel: 0.15 mm</div>
                <div class="overlay-datos bottom-right">KVp: 90<br>mA: 10.0</div>
                
                <div class="ejes-3d">
                    <div class="eje x">X</div><div class="eje y">Y</div><div class="eje z">Z</div>
                </div>
            </div>

        </section>
        
    </div>

    <script>
document.addEventListener("DOMContentLoaded", () => {
    const parametros = new URLSearchParams(window.location.search);
    const nombrePaciente = parametros.get('nombre');
    const idPaciente = parametros.get('id');

    if (nombrePaciente) {
        const h2Nombre = document.querySelector('.paciente-nombre') || document.querySelector('.visor-info-paciente h2');
        if (h2Nombre) {
            h2Nombre.innerHTML = `Paciente: <span>${nombrePaciente}</span>`;
        }
    }

    const btnVolver = document.querySelector('a[href="expediente.html"]');
    if (btnVolver && idPaciente) {
        btnVolver.href = `detalle_expediente.html?id=${idPaciente}`; 
    }
});

async function subirAlServidor() {
    const id = new URLSearchParams(window.location.search).get('id');
    const archivoInput = document.getElementById('inputArchivo').files[0];
    const notas = document.getElementById('inputNotas').value;

    if (!archivoInput || !id) {
        alert("Falta seleccionar un archivo o no hay ID de paciente en la URL");
        return;
    }

    const formData = new FormData();
    formData.append("archivo_3d", archivoInput);
    formData.append("id_paciente", id);
    formData.append("notas", notas);
    formData.append("piezas", "16, 24");

    try {
        const res = await fetch('http://localhost:7000/api/radiografias', {
            method: 'POST',
            body: formData 
        });

        if (res.ok) {
            alert("¡Subida exitosa!");
            document.querySelector('.img-3d-mockup').src = URL.createObjectURL(archivoInput);
        } else {
            alert("Error al subir el archivo al servidor");
        }
    } catch (error) {
        console.error("Error de conexión:", error);
    }
}

function aplicarEfectos3D() {
    const img = document.querySelector('.img-3d-mockup');
    const sliderRotacion = document.getElementById('sliderRotacion');
    const sliderZoom = document.getElementById('sliderZoom');
    const sliderContraste = document.getElementById('sliderContraste');

    if (!img || !sliderRotacion || !sliderZoom || !sliderContraste) return;

    if (img.parentElement) {
        img.parentElement.style.overflow = 'hidden';
    }

    const rotacion = (sliderRotacion.value - 180) / 4; // Rotación en grados
    const zoom = sliderZoom.value / 50;                 // Zoom: 50 es tamaño normal (1x)
    const contraste = sliderContraste.value * 2;       // Contraste en porcentaje

    // Aplicar transformaciones visuales
    img.style.transform = `scale(${zoom}) rotate(${rotacion}deg)`;
    img.style.filter = `contrast(${contraste}%)`;
    img.style.transition = 'transform 0.05s ease, filter 0.05s ease';
}
</script>

</body>
</html>
